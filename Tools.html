<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>授权管理 · Supabase</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #f0f4fa 0%, #e6edf4 100%);
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 20px;
            min-height: 100vh;
        }

        .card {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(2px);
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.15), 0 1px 2px rgba(0, 0, 0, 0.03);
            padding: 24px 28px 32px;
            transition: all 0.2s ease;
        }

        .card-header {
            text-align: center;
            margin-bottom: 28px;
        }
        h1 {
            font-size: 1.9rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1e293b, #2d3a4e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }
        .subtitle {
            font-size: 0.85rem;
            color: #5b6e8c;
            margin-top: 8px;
            font-weight: 450;
        }

        /* 统计卡片 */
        .stats-grid {
            display: flex;
            gap: 20px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: white;
            border-radius: 28px;
            padding: 18px 24px;
            flex: 1;
            min-width: 120px;
            text-align: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.04);
            border: 1px solid #eef2ff;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #1e293b;
            line-height: 1.2;
        }
        .stat-label {
            font-size: 0.75rem;
            color: #5b6e8c;
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }
        .search-row {
            flex: 2;
            min-width: 200px;
        }
        .search-row input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 40px;
            font-size: 0.95rem;
            background: white;
            outline: none;
        }
        .action-buttons-bar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .add-row {
            display: flex;
            gap: 14px;
            margin-bottom: 24px;
            align-items: flex-end;
            flex-wrap: wrap;
        }
        .add-row > div {
            flex: 1;
            min-width: 140px;
        }
        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: #3b4e6b;
            margin-bottom: 6px;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }
        input, .inline-datetime, .inline-note {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 20px;
            font-size: 0.95rem;
            background: white;
            outline: none;
            transition: 0.2s;
            font-family: inherit;
        }
        input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
        }
        button {
            background: white;
            border: 1.5px solid #e2e8f0;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
            font-family: inherit;
            min-height: 44px;
        }
        button.primary {
            background: #1e40af;
            border-color: #1e40af;
            color: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        button.primary:hover {
            background: #1e3a8a;
            transform: translateY(-1px);
        }
        button.secondary:hover {
            background: #f1f5f9;
            border-color: #cbd5e1;
        }
        button.danger {
            background: #fee2e2;
            border-color: #f3baba;
            color: #b91c1c;
        }
        button.danger:hover {
            background: #fecaca;
        }

        .table-wrapper {
            overflow-x: auto;
            margin-top: 20px;
            border-radius: 24px;
            background: rgba(255,255,255,0.5);
            padding: 2px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            min-width: 1000px;
            background: white;
            border-radius: 20px;
            overflow: hidden;
        }
        th, td {
            padding: 14px 12px;
            text-align: center;
            vertical-align: middle;
            border-bottom: 1px solid #edf2f7;
        }
        th {
            background: #f8fafc;
            font-weight: 600;
            color: #1e293b;
            font-size: 0.8rem;
            cursor: pointer;
            user-select: none;
            position: relative;
        }
        th:hover {
            background: #eef2ff;
        }
        th.sort-asc::after {
            content: " ▲";
            font-size: 0.7rem;
        }
        th.sort-desc::after {
            content: " ▼";
            font-size: 0.7rem;
        }
        tr:hover td {
            background-color: #fafcff;
        }
        /* 到期图标样式 */
        .expire-icon {
            display: inline-block;
            margin-left: 6px;
            font-size: 0.8rem;
            cursor: help;
        }
        .expire-icon.critical {
            color: #dc2626;
        }
        .expire-icon.warning {
            color: #f59e0b;
        }
        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 10px;
            margin-right: 8px;
        }
        .status-online {
            color: #059669;
            font-weight: 600;
        }
        .status-offline {
            color: #dc2626;
            font-weight: 500;
        }
        .action-buttons {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .editBtn, .deleteBtn, .updateBtn, .cancelBtn {
            background: transparent;
            border: 1px solid #e2e8f0;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            min-height: 34px;
        }
        .editBtn:hover { background: #eef2ff; border-color: #a5c0f0; }
        .deleteBtn:hover { background: #fee2e2; border-color: #f3baba; }
        .updateBtn { background: #1e40af; border-color: #1e40af; color: white; }
        .cancelBtn { background: #f1f5f9; border-color: #cbd5e1; }

        .inline-datetime, .inline-note {
            padding: 8px 10px;
            font-size: 0.8rem;
            border-radius: 16px;
        }
        /* 只读文本样式 */
        .readonly-text {
            background: #f8fafc;
            padding: 6px 10px;
            border-radius: 20px;
            display: inline-block;
            font-size: 0.8rem;
        }

        /* Toast 通知 */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1100;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .toast {
            background: white;
            border-radius: 40px;
            padding: 12px 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.3s ease;
            border-left: 4px solid;
        }
        .toast.success { border-left-color: #10b981; }
        .toast.error { border-left-color: #ef4444; }
        .toast.info { border-left-color: #3b82f6; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* 密码对话框模态框 */
        .password-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .password-modal.active {
            display: flex;
        }
        .password-card {
            background: white;
            border-radius: 32px;
            padding: 28px 24px;
            width: 90%;
            max-width: 360px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.2);
            text-align: center;
        }
        .password-card p {
            margin-bottom: 20px;
            font-size: 1rem;
            font-weight: 500;
            color: #1e293b;
        }
        .password-card input {
            width: 100%;
            padding: 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 40px;
            font-size: 1rem;
            margin-bottom: 24px;
            text-align: center;
        }
        .password-card div {
            display: flex;
            justify-content: center;
            gap: 12px;
        }
        .password-card button {
            margin: 0;
            min-width: 100px;
        }

        /* 骨架屏 */
        .skeleton-row td {
            height: 60px;
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* 批量选择 */
        .checkbox-col {
            width: 30px;
            text-align: center;
        }
        .batch-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-bottom: 12px;
            gap: 15px;
        }
        .selected-info {
            font-size: 0.8rem;
            color: #475569;
        }

        /* 操作日志 */
        .log-panel {
            margin-top: 30px;
            border-top: 1px solid #e2e8f0;
            padding-top: 20px;
        }
        .log-title {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .log-list {
            background: #f8fafc;
            border-radius: 20px;
            padding: 12px;
            max-height: 200px;
            overflow-y: auto;
            font-size: 0.75rem;
            color: #475569;
        }
        .log-item {
            padding: 6px 0;
            border-bottom: 1px solid #e2e8f0;
        }

        @media (max-width: 700px) {
            body { padding: 12px; }
            .card { padding: 18px 20px 24px; border-radius: 28px; }
            h1 { font-size: 1.6rem; }
            .add-row { flex-direction: column; align-items: stretch; gap: 12px; }
            button { justify-content: center; }
            th, td { padding: 10px 8px; font-size: 0.75rem; }
            .checkbox-col { width: 25px; }
        }
    </style>
</head>
<body>
<div class="card">
    <div class="card-header">
        <h1>📡 授权管理中枢</h1>
        <div class="subtitle">设备状态 · 实时同步 · 云端控制</div>
    </div>

    <!-- 统计卡片 -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-value" id="totalCount">-</div>
            <div class="stat-label">总设备数</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="onlineCount">-</div>
            <div class="stat-label">在线设备</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="expiringSoonCount">-</div>
            <div class="stat-label">7天内到期</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="expiredCount">-</div>
            <div class="stat-label">已过期</div>
        </div>
    </div>

    <div class="toolbar">
        <div class="search-row">
            <input type="text" id="searchInput" placeholder="🔍 搜索机器码 / 备注 / 城市" autocomplete="off">
        </div>
        <div class="action-buttons-bar">
            <button id="exportBtn" class="secondary">📎 导出 CSV</button>
            <button id="batchDeleteBtn" class="danger">🗑️ 批量删除</button>
        </div>
    </div>

    <!-- 添加授权表单（无城市输入） -->
    <div class="add-row">
        <div><label>🖥️ 机器码 *</label><input type="text" id="machineCode" placeholder="例如 SN-XXXX"></div>
        <div><label>⏱️ 过期时间 *</label><input type="datetime-local" id="expireDate"></div>
        <div><label>📝 备注</label><input type="text" id="note" placeholder="设备归属 / 位置"></div>
        <button id="addBtn" class="primary">➕ 添加授权</button>
    </div>

    <div class="batch-bar">
        <div class="selected-info" id="selectedCount">已选择 0 项</div>
    </div>

    <div class="table-wrapper">
        <table id="licenseTable">
            <thead>
                <tr>
                    <th class="checkbox-col"><input type="checkbox" id="selectAllCheckbox"></th>
                    <th data-sort="machine_code">机器码</th>
                    <th data-sort="note">备注</th>
                    <th data-sort="city">城市</th>
                    <th data-sort="expire_date">过期时间</th>
                    <th data-sort="last_online_time">最后在线</th>
                    <th data-sort="last_request_time">最后请求</th>
                    <th>在线状态</th>
                    <th style="width:160px">操作</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr class="skeleton-row"><td colspan="9"><div style="height:60px"></div></td></tr>
            </tbody>
        </table>
    </div>

    <!-- 操作日志面板 -->
    <div class="log-panel">
        <div class="log-title">
            <span>📋 操作日志</span>
            <button id="clearLogBtn" class="secondary" style="padding:4px 12px; font-size:0.7rem;">清空日志</button>
        </div>
        <div class="log-list" id="logList">
            <div class="log-item">✨ 页面加载完成，等待数据...</div>
        </div>
    </div>
</div>

<!-- 密码弹窗 -->
<div id="passwordModal" class="password-modal">
    <div class="password-card">
        <p id="passwordMessage">请输入管理员密码</p>
        <input type="password" id="passwordInput" placeholder="密码" autocomplete="off">
        <div>
            <button id="passwordConfirmBtn" class="primary">确认</button>
            <button id="passwordCancelBtn" class="secondary">取消</button>
        </div>
    </div>
</div>

<!-- Toast 容器 -->
<div class="toast-container" id="toastContainer"></div>

<script>
    // ==================== 配置 ====================
    const WORKER_API_URL = "https://newtools.csl1671.workers.dev";   // 替换为你的 Worker 地址
    // ============================================

    let currentData = [];
    let editingMachine = null;
    let currentSort = { column: 'machine_code', order: 'asc' };
    let searchKeyword = '';
    let selectedMachines = new Set();
    let operationLogs = [];

    function addLog(message, type = 'info') {
        const time = new Date().toLocaleTimeString();
        operationLogs.unshift({ time, message, type });
        if (operationLogs.length > 50) operationLogs.pop();
        renderLogs();
    }
    function renderLogs() {
        const logDiv = document.getElementById('logList');
        if (operationLogs.length === 0) {
            logDiv.innerHTML = '<div class="log-item">暂无操作记录</div>';
            return;
        }
        logDiv.innerHTML = operationLogs.map(log => `<div class="log-item">[${log.time}] ${log.message}</div>`).join('');
    }

    function showToast(message, type = 'info') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `<span>${message}</span>`;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    // 密码弹窗逻辑
    let passwordResolver = null;
    const modal = document.getElementById('passwordModal');
    const passwordInput = document.getElementById('passwordInput');
    const passwordMessage = document.getElementById('passwordMessage');
    function showPasswordDialog(message) {
        passwordMessage.innerText = message;
        modal.classList.add('active');
        passwordInput.value = '';
        passwordInput.focus();
        return new Promise((resolve) => { passwordResolver = resolve; });
    }
    function closePasswordDialog(value) {
        modal.classList.remove('active');
        if (passwordResolver) { passwordResolver(value); passwordResolver = null; }
    }
    document.getElementById('passwordConfirmBtn').onclick = () => closePasswordDialog(passwordInput.value);
    document.getElementById('passwordCancelBtn').onclick = () => closePasswordDialog(null);
    modal.addEventListener('click', (e) => { if (e.target === modal) closePasswordDialog(null); });
    passwordInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') document.getElementById('passwordConfirmBtn').click(); });

    // API 调用（旧版原有）
    async function callApi(method, path, body = null) {
        const url = `${WORKER_API_URL}${path}`;
        const options = { method, headers: { 'Content-Type': 'application/json' } };
        if (body) options.body = JSON.stringify(body);
        const response = await fetch(url, options);
        const result = await response.json();
        if (!response.ok) throw new Error(result.error || '请求失败');
        return result;
    }
    async function callAdmin(action, data, password) {
        const response = await fetch(WORKER_API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action, password, ...data })
        });
        const result = await response.json();
        if (!response.ok) throw new Error(result.error || '操作失败');
        return result;
    }

    async function loadLicenses() {
        document.getElementById('tableBody').innerHTML = '<tr class="skeleton-row"><td colspan="9"><div style="height:60px"></div></td></tr>';
        try {
            const data = await callApi('GET', '/licenses');
            currentData = data || [];
            editingMachine = null;
            selectedMachines.clear();
            updateSelectedCount();
            renderTable();
            updateStats();  // 更新统计卡片
            addLog(`加载了 ${currentData.length} 条授权记录`, 'info');
            showToast(`加载成功，共 ${currentData.length} 条记录`, 'success');
        } catch (err) {
            showToast('加载失败：' + err.message, 'error');
            document.getElementById('tableBody').innerHTML = '<tr><td colspan="9" style="text-align:center;">❌ 加载失败，请检查网络或Worker配置</td></tr>';
        }
    }

    // 更新统计卡片
    function updateStats() {
        const total = currentData.length;
        const now = new Date();
        const online = currentData.filter(item => {
            if (!item.last_online_time) return false;
            const last = new Date(item.last_online_time);
            return (now - last) <= 5 * 60 * 1000;
        }).length;
        const expiringSoon = currentData.filter(item => {
            const expire = new Date(item.expire_date);
            const diffDays = Math.ceil((expire - now) / (1000 * 60 * 60 * 24));
            return diffDays > 0 && diffDays <= 7;
        }).length;
        const expired = currentData.filter(item => {
            const expire = new Date(item.expire_date);
            return expire < now;
        }).length;
        document.getElementById('totalCount').innerText = total;
        document.getElementById('onlineCount').innerText = online;
        document.getElementById('expiringSoonCount').innerText = expiringSoon;
        document.getElementById('expiredCount').innerText = expired;
    }

    function formatDateTime(utcString) {
        if (!utcString) return '—';
        const d = new Date(utcString);
        return isNaN(d.getTime()) ? '无效' : d.toLocaleString();
    }

    function getOnlineStatus(lastOnlineUtc) {
        if (!lastOnlineUtc) return { text: '从未在线', class: 'status-offline', dot: '#9ca3af' };
        const last = new Date(lastOnlineUtc);
        const now = new Date();
        const diffMinutes = Math.floor((now - last) / (1000 * 60));
        if (diffMinutes <= 5) return { text: '在线', class: 'status-online', dot: '#10b981' };
        let text = '';
        if (diffMinutes < 60) text = `${diffMinutes}分钟前`;
        else if (diffMinutes < 1440) text = `${Math.floor(diffMinutes / 60)}小时前`;
        else if (diffMinutes < 43200) text = `${Math.floor(diffMinutes / 1440)}天前`;
        else text = `${Math.floor(diffMinutes / 43200)}个月前`;
        return { text: `离线 ${text}`, class: 'status-offline', dot: '#ef4444' };
    }

    function formatCity(cityCode) {
        if (!cityCode) return '—';
        if (cityCode === 'China-HongKong') return '香港';
        if (cityCode === 'China-Macau') return '澳门';
        if (cityCode === 'China-Taiwan') return '台湾';
        const directMunicipalities = { 'Beijing': '北京', 'Shanghai': '上海', 'Tianjin': '天津', 'Chongqing': '重庆' };
        const provinceMap = { 'Guangdong': '广东', 'Guangxi': '广西', 'Hainan': '海南', 'Fujian': '福建', 'Jiangxi': '江西', 'Hunan': '湖南', 'Hubei': '湖北', 'Henan': '河南', 'Hebei': '河北', 'Shandong': '山东', 'Shanxi': '山西', 'Shaanxi': '陕西', 'Gansu': '甘肃', 'Qinghai': '青海', 'Sichuan': '四川', 'Guizhou': '贵州', 'Yunnan': '云南', 'Liaoning': '辽宁', 'Jilin': '吉林', 'Heilongjiang': '黑龙江', 'Jiangsu': '江苏', 'Zhejiang': '浙江', 'Anhui': '安徽', 'InnerMongolia': '内蒙古', 'Ningxia': '宁夏', 'Xinjiang': '新疆', 'Xizang': '西藏', 'Taiwan': '台湾' };
        const cityMap = { 'Guangzhou': '广州', 'Shenzhen': '深圳', 'Foshan': '佛山', 'Dongguan': '东莞', 'Zhuhai': '珠海', 'Huizhou': '惠州', 'Zhongshan': '中山', 'Jiangmen': '江门', 'Nanning': '南宁', 'Guilin': '桂林', 'Fuzhou': '福州', 'Xiamen': '厦门', 'Nanchang': '南昌', 'Changsha': '长沙', 'Wuhan': '武汉', 'Zhengzhou': '郑州', 'Shijiazhuang': '石家庄', 'Jinan': '济南', 'Qingdao': '青岛', 'Taiyuan': '太原', 'XiAn': '西安', 'Lanzhou': '兰州', 'Xining': '西宁', 'Chengdu': '成都', 'Guiyang': '贵阳', 'Kunming': '昆明', 'Shenyang': '沈阳', 'Dalian': '大连', 'Changchun': '长春', 'Harbin': '哈尔滨', 'Nanjing': '南京', 'Suzhou': '苏州', 'Hangzhou': '杭州', 'Ningbo': '宁波', 'Hefei': '合肥', 'Hohhot': '呼和浩特', 'Yinchuan': '银川', 'Urumqi': '乌鲁木齐', 'Lhasa': '拉萨', 'Haikou': '海口', 'Sanya': '三亚', 'HongKong': '香港', 'Macau': '澳门', 'Taipei': '台北' };
        const parts = cityCode.split('-');
        if (parts.length === 3 && parts[0] === 'China') {
            let province = parts[1];
            let city = parts[2];
            if (directMunicipalities[province]) return directMunicipalities[province];
            let provinceZh = provinceMap[province] || province;
            let cityZh = cityMap[city] || city;
            return `${provinceZh} · ${cityZh}`;
        }
        return cityCode;
    }

    function getExpireIcon(expireDateUtc) {
        const expire = new Date(expireDateUtc);
        const now = new Date();
        const diffDays = Math.ceil((expire - now) / (1000 * 60 * 60 * 24));
        if (diffDays <= 0) return { icon: '🔴', title: '已过期', class: 'critical' };
        if (diffDays <= 7) return { icon: '🔴', title: `剩余 ${diffDays} 天`, class: 'critical' };
        if (diffDays <= 30) return { icon: '🟠', title: `剩余 ${diffDays} 天`, class: 'warning' };
        return { icon: '', title: '', class: '' };
    }

    function sortData(data, column, order) {
        return [...data].sort((a, b) => {
            let valA = a[column];
            let valB = b[column];
            if (column === 'expire_date' || column === 'last_online_time' || column === 'last_request_time') {
                valA = valA ? new Date(valA).getTime() : 0;
                valB = valB ? new Date(valB).getTime() : 0;
            } else if (typeof valA === 'string') {
                valA = valA?.toLowerCase() || '';
                valB = valB?.toLowerCase() || '';
            }
            if (valA < valB) return order === 'asc' ? -1 : 1;
            if (valA > valB) return order === 'asc' ? 1 : -1;
            return 0;
        });
    }

    function filterData(data, keyword) {
        if (!keyword) return data;
        const lowerKw = keyword.toLowerCase();
        return data.filter(item => 
            item.machine_code?.toLowerCase().includes(lowerKw) ||
            item.note?.toLowerCase().includes(lowerKw) ||
            formatCity(item.city).toLowerCase().includes(lowerKw)
        );
    }

    function updateSelectAll() {
        const filtered = getFilteredAndSorted();
        const allChecked = filtered.length > 0 && filtered.every(item => selectedMachines.has(item.machine_code));
        document.getElementById('selectAllCheckbox').checked = allChecked;
        updateSelectedCount();
    }
    function updateSelectedCount() {
        document.getElementById('selectedCount').innerText = `已选择 ${selectedMachines.size} 项`;
    }
    function getFilteredAndSorted() {
        let filtered = filterData(currentData, searchKeyword);
        filtered = sortData(filtered, currentSort.column, currentSort.order);
        return filtered;
    }

    function renderTable() {
        const filtered = getFilteredAndSorted();
        const tbody = document.getElementById('tableBody');
        if (!filtered.length) {
            tbody.innerHTML = '<tr><td colspan="9" style="text-align:center; padding:40px;">✨ 暂无匹配记录</td></tr>';
            return;
        }
        let html = '';
        for (const lic of filtered) {
            const machine = escapeHtml(lic.machine_code);
            const note = escapeHtml(lic.note || '');
            const cityDisplay = formatCity(lic.city);
            const expireLocal = new Date(lic.expire_date).toLocaleString();
            const lastOnline = lic.last_online_time;
            const lastRequest = lic.last_request_time;
            const status = getOnlineStatus(lastOnline);
            const lastOnlineStr = formatDateTime(lastOnline);
            const lastRequestStr = formatDateTime(lastRequest);
            const expireIcon = getExpireIcon(lic.expire_date);
            const expireIconHtml = expireIcon.icon ? `<span class="expire-icon ${expireIcon.class}" title="${expireIcon.title}">${expireIcon.icon}</span>` : '';
            const isChecked = selectedMachines.has(lic.machine_code);
            if (editingMachine === lic.machine_code) {
                const expireId = `edit_expire_${machine.replace(/[^a-zA-Z0-9]/g, '_')}`;
                const noteId = `edit_note_${machine.replace(/[^a-zA-Z0-9]/g, '_')}`;
                const currentLocal = toDatetimeLocal(lic.expire_date);
                html += `<tr>
                    <td class="checkbox-col"><input type="checkbox" disabled></td>
                    <td>${machine}</td>
                    <td><input type="text" id="${noteId}" value="${escapeHtml(lic.note || '')}" class="inline-note" placeholder="备注"></td>
                    <td><span class="readonly-text">${cityDisplay}</span></td>
                    <td><input type="datetime-local" id="${expireId}" value="${currentLocal}" class="inline-datetime"></td>
                    <td>${lastOnlineStr}</td>
                    <td>${lastRequestStr}</td>
                    <td><span class="status-dot" style="background:${status.dot}"></span>${status.text}</td>
                    <td class="action-buttons">
                        <button class="updateBtn" data-code="${lic.machine_code}">✅ 更新</button>
                        <button class="cancelBtn">❌ 取消</button>
                    </td>
                </tr>`;
            } else {
                html += `<tr>
                    <td class="checkbox-col"><input type="checkbox" class="row-checkbox" data-code="${lic.machine_code}" ${isChecked ? 'checked' : ''}></td>
                    <td>${machine}</td>
                    <td>${note}</td>
                    <td>${cityDisplay}</td>
                    <td>${expireLocal} ${expireIconHtml}</td>
                    <td>${lastOnlineStr}</td>
                    <td>${lastRequestStr}</td>
                    <td><span class="status-dot" style="background:${status.dot}"></span><span class="${status.class}">${status.text}</span></td>
                    <td class="action-buttons">
                        <button class="editBtn" data-code="${lic.machine_code}">✏️ 编辑</button>
                        <button class="deleteBtn" data-code="${lic.machine_code}">🗑️ 删除</button>
                    </td>
                </tr>`;
            }
        }
        tbody.innerHTML = html;

        // 绑定复选框事件
        document.querySelectorAll('.row-checkbox').forEach(cb => {
            cb.addEventListener('change', (e) => {
                const code = cb.getAttribute('data-code');
                if (cb.checked) selectedMachines.add(code);
                else selectedMachines.delete(code);
                updateSelectAll();
            });
        });
        // 全选复选框
        const selectAllCheckbox = document.getElementById('selectAllCheckbox');
        selectAllCheckbox.onchange = (e) => {
            const filtered = getFilteredAndSorted();
            if (e.target.checked) {
                filtered.forEach(item => selectedMachines.add(item.machine_code));
            } else {
                filtered.forEach(item => selectedMachines.delete(item.machine_code));
            }
            updateSelectAll();
            renderTable();
        };

        // 编辑/删除/更新/取消事件
        if (!editingMachine) {
            document.querySelectorAll('.editBtn').forEach(btn => {
                btn.addEventListener('click', () => {
                    editingMachine = btn.getAttribute('data-code');
                    renderTable();
                });
            });
            document.querySelectorAll('.deleteBtn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const code = btn.getAttribute('data-code');
                    if (!confirm(`确定删除设备 ${code} 吗？`)) return;
                    const pwd = await showPasswordDialog('请输入管理员密码以删除授权');
                    if (!pwd) return;
                    try {
                        await callAdmin('delete', { machineCode: code }, pwd);
                        addLog(`删除设备 ${code}`, 'info');
                        showToast("删除成功", 'success');
                        await loadLicenses();
                    } catch (err) {
                        showToast("删除失败：" + err.message, 'error');
                    }
                });
            });
        } else {
            document.querySelectorAll('.updateBtn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const code = btn.getAttribute('data-code');
                    const expireId = `edit_expire_${code.replace(/[^a-zA-Z0-9]/g, '_')}`;
                    const noteId = `edit_note_${code.replace(/[^a-zA-Z0-9]/g, '_')}`;
                    const newExpireLocal = document.getElementById(expireId)?.value;
                    const newNote = document.getElementById(noteId)?.value || '';
                    if (!newExpireLocal) { showToast("请填写过期时间", 'error'); return; }
                    const utcExpire = new Date(newExpireLocal).toISOString();
                    const pwd = await showPasswordDialog('请输入管理员密码以更新授权');
                    if (!pwd) return;
                    try {
                        await callAdmin('update', { machineCode: code, expireDate: utcExpire, note: newNote }, pwd);
                        addLog(`更新设备 ${code}`, 'info');
                        showToast("更新成功", 'success');
                        editingMachine = null;
                        await loadLicenses();
                    } catch (err) {
                        showToast("更新失败：" + err.message, 'error');
                    }
                });
            });
            document.querySelectorAll('.cancelBtn').forEach(btn => {
                btn.addEventListener('click', () => {
                    editingMachine = null;
                    renderTable();
                });
            });
        }
        // 更新表头排序样式
        document.querySelectorAll('th[data-sort]').forEach(th => {
            const col = th.getAttribute('data-sort');
            if (col === currentSort.column) {
                th.classList.add(currentSort.order === 'asc' ? 'sort-asc' : 'sort-desc');
            } else {
                th.classList.remove('sort-asc', 'sort-desc');
            }
        });
    }

    function toDatetimeLocal(utcString) {
        if (!utcString) return '';
        const d = new Date(utcString);
        if (isNaN(d.getTime())) return '';
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}T${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
    }

    function exportToCSV() {
        const filtered = getFilteredAndSorted();
        if (!filtered.length) { showToast("无数据可导出", 'error'); return; }
        const headers = ['机器码', '备注', '城市', '过期时间', '最后在线', '最后请求', '在线状态'];
        const rows = filtered.map(lic => [
            lic.machine_code,
            lic.note || '',
            formatCity(lic.city),
            new Date(lic.expire_date).toLocaleString(),
            formatDateTime(lic.last_online_time),
            formatDateTime(lic.last_request_time),
            getOnlineStatus(lic.last_online_time).text
        ]);
        const csvContent = [headers, ...rows].map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',')).join('\n');
        const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.href = url;
        link.setAttribute('download', `licenses_${new Date().toISOString().slice(0,19)}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
        addLog(`导出 CSV，共 ${filtered.length} 条`, 'info');
        showToast("导出成功", 'success');
    }

    async function batchDelete() {
        if (selectedMachines.size === 0) { showToast("请先选择要删除的设备", 'error'); return; }
        const pwd = await showPasswordDialog(`确认删除 ${selectedMachines.size} 个设备吗？请输入密码`);
        if (!pwd) return;
        const codes = Array.from(selectedMachines);
        let successCount = 0, failCount = 0;
        for (const code of codes) {
            try {
                await callAdmin('delete', { machineCode: code }, pwd);
                successCount++;
            } catch (err) {
                failCount++;
                console.error(`删除 ${code} 失败`, err);
            }
        }
        if (successCount > 0) {
            addLog(`批量删除：成功 ${successCount} 个，失败 ${failCount} 个`, 'info');
            showToast(`批量删除完成：成功 ${successCount} 个`, 'success');
            await loadLicenses();
        } else {
            showToast("批量删除失败", 'error');
        }
    }

    // 添加授权（无城市）
    document.getElementById('addBtn').onclick = async () => {
        const machineCode = document.getElementById('machineCode').value.trim();
        let expireLocal = document.getElementById('expireDate').value;
        const note = document.getElementById('note').value.trim();
        if (!machineCode) { showToast("机器码不能为空", 'error'); return; }
        if (!expireLocal) { showToast("请选择过期时间", 'error'); return; }
        const utcExpire = new Date(expireLocal).toISOString();
        const pwd = await showPasswordDialog('请输入管理员密码以添加授权');
        if (!pwd) return;
        try {
            // 注意：城市字段由客户端软件上传，这里不传递，Worker 会保持为空或自动更新
            await callAdmin('add', { machineCode, expireDate: utcExpire, note }, pwd);
            addLog(`添加设备 ${machineCode}`, 'info');
            showToast("添加成功", 'success');
            document.getElementById('machineCode').value = '';
            document.getElementById('note').value = '';
            await loadLicenses();
        } catch (err) {
            showToast("添加失败：" + err.message, 'error');
        }
    };

    // 搜索防抖
    let searchTimeout;
    document.getElementById('searchInput').addEventListener('input', (e) => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
            searchKeyword = e.target.value.trim();
            renderTable();
            updateSelectAll();
        }, 300);
    });

    document.getElementById('exportBtn').onclick = exportToCSV;
    document.getElementById('batchDeleteBtn').onclick = batchDelete;
    document.getElementById('clearLogBtn').onclick = () => {
        operationLogs = [];
        renderLogs();
        addLog("日志已清空", 'info');
    };

    function setDefaultExpire() {
        const now = new Date();
        now.setMonth(now.getMonth() + 1);
        const y = now.getFullYear(), m = String(now.getMonth()+1).padStart(2,'0'), d = String(now.getDate()).padStart(2,'0');
        const h = String(now.getHours()).padStart(2,'0'), min = String(now.getMinutes()).padStart(2,'0');
        document.getElementById('expireDate').value = `${y}-${m}-${d}T${h}:${min}`;
    }

    setDefaultExpire();
    loadLicenses();
</script>
